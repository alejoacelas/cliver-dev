information_sources:
  - source: "NIH RePORTER search"
    url: "https://reporter.nih.gov/"
    what_to_look_for: "Search by institution name. Check Fogarty International Center grants for non-US institutions. Check SBIR/STTR grants for small companies."
  - source: "NSF Award Search"
    url: "https://nsf.gov/awardsearch/"
    what_to_look_for: "Search by institution. Check international collaboration awards (IRES, PIRE programs) for non-US institutions."
  - source: "UKRI Gateway to Research"
    url: "https://gtr.ukri.org/"
    what_to_look_for: "Search organisations. Check non-UK collaborators. Coverage of EU-funded institutions (post-Brexit gaps)."
  - source: "PubMed"
    url: "https://pubmed.ncbi.nlm.nih.gov/"
    what_to_look_for: "Affiliation field search. Test transliterated institution names (Chinese, Arabic, Russian) to see if they match."
  - source: "customers.csv"
    what_to_look_for: "Filter for institutions not in OECD countries. Filter for 'Controlled Agent Industry' type to find small companies."

pre_committed_reasoning: |
  NIH RePORTER and NSF Awards are strong signals for US academic institutions but will miss
  most non-US entities. UKRI covers UK institutions well. PubMed is the broadest — any
  institution with researchers who publish in biomedical journals will appear, regardless of
  country or funding source.

  Expected coverage gaps:
  1. Very new biotech startups (< 2 years old) — no time to publish or receive grants
  2. Community bio labs — operate outside the traditional funding/publication ecosystem
  3. Small non-OECD universities — may have publications but not in major indexed journals
  4. Industry companies — some publish (pharma), many don't (contract labs, reagent companies)
  5. Government labs in non-OECD countries — may publish but under varied institutional names

  The key question for this group is: does the ABSENCE of funding/publication records mean
  the institution is illegitimate, or just small/new/non-academic? The false-flag rate for
  legitimate-but-unpublished institutions is the critical metric.
