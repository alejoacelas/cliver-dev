group: funding-legitimacy
endpoints: [nih-reporter, nsf-awards, ukri, pubmed]
kyc_steps: [a]

seed_cases:
  - id: 1
    name: "Massachusetts Institute of Technology"
    type: academic
    country: US
    source: general_knowledge
    difficulty: easy
    query_params:
      institution_name: "Massachusetts Institute of Technology"
      alt_names: ["MIT"]
      pubmed_affiliation_query: "Massachusetts Institute of Technology[Affiliation]"
      nih_org_name: "MASSACHUSETTS INSTITUTE OF TECHNOLOGY"
      nsf_keyword: "Massachusetts Institute of Technology"
    hypothesis: "Baseline easy case. Should have thousands of NIH/NSF awards and tens of thousands of PubMed articles."

  - id: 2
    name: "University of Oxford"
    type: academic
    country: GB
    source: general_knowledge
    difficulty: easy
    query_params:
      institution_name: "University of Oxford"
      pubmed_affiliation_query: "University of Oxford[Affiliation]"
      ukri_query: "Oxford"
      nsf_keyword: "University of Oxford"
    hypothesis: "Major UK university. Should be very well covered in UKRI and PubMed. May have some NSF awards through international collaborations. NIH coverage possible but weaker than US institutions."

