group: funding-legitimacy
endpoints: [nih-reporter, nsf-awards, ukri, pubmed]
kyc_steps: [a]
tested_at: "2026-04-14"
total_cases: 25
rounds: 2

summary:
  covered: 15
  partially_covered: 5
  not_covered: 5

coverage_boundaries:
  - boundary: "Community bio labs / makerspaces"
    status: not_covered
    evidence: "Tested 3 community labs (Genspace, BioCurious, Counter Culture Labs). NIH: 0 grants for all. NSF: 0 for all. UKRI: 404 error for all. PubMed: 2-5 articles each (likely coincidental name matches, not institutional affiliations)."
    cases: [9, 15, 16]

  - boundary: "Small biotech startups (<3 years)"
    status: not_covered
    evidence: "Tested Lay Sciences. NIH: 0, NSF: 0, UKRI: 0, PubMed: 12066 (but 'Lay Sciences' matches 'lay' as a word in titles — false positive). No legitimate funding signal."
    cases: [8]

  - boundary: "Non-US, non-UK institutions — NIH/NSF"
    status: partially_covered
    evidence: "NIH found grants for University of Nairobi (146), Makerere (269), Chulalongkorn (5), UFMG (20), Chinese Academy of Sciences (48), but 0 for Tsinghua, 0 for Zhejiang Sci-Tech, 0 for IIT Kanpur. NSF found IIT Kanpur but 0 for all other non-US institutions."
    cases: [4, 5, 7, 11, 12, 13, 14, 17]

  - boundary: "CROs and contract labs"
    status: partially_covered
    evidence: "Charles River: NIH 220, UKRI found, PubMed 1294. WuXi AppTec: NIH 0, PubMed 550. Eurofins: NIH 59, PubMed 1443. Mixed — large CROs with publications are covered; smaller ones may not be."
    cases: [18, 19, 20]

  - boundary: "PubMed as universal fallback"
    status: covered
    evidence: "PubMed found publications for 22/25 tested institutions. Only community bio labs had <10 articles. Even sanctioned institutions, non-OECD universities, and CROs had hundreds to thousands of articles. PubMed is by far the broadest legitimacy signal."
    cases: [1, 2, 3, 4, 5, 6, 7, 10, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 22, 23, 24, 25]

results:
  # Round 1 — Seed cases
  - case_id: 1
    round: 1
    name: "Massachusetts Institute of Technology"
    type: academic
    country: US
    difficulty: easy
    endpoints_tested:
      - endpoint: nih-reporter
        query: 'POST /v2/projects/search {"criteria":{"org_names":["MASSACHUSETTS INSTITUTE OF TECHNOLOGY"]}}'
        status: covered
        response_summary: {total_grants: 14753}
      - endpoint: nsf-awards
        query: 'GET /awards.json?awardeeName="Massachusetts Institute of Technology"'
        status: covered
        response_summary: {found: true, awardeeName: "Massachusetts Institute of Technology"}
      - endpoint: ukri
        query: "GET /organisations?q=MIT"
        status: covered
        response_summary: {totalSize: 707, note: "MIT appears in UKRI through international collaborations"}
      - endpoint: pubmed
        query: "GET /esearch.fcgi?term=Massachusetts+Institute+of+Technology[Affiliation]"
        status: covered
        response_summary: {article_count: 52235}
    notes: "Baseline. All four databases have strong coverage."

