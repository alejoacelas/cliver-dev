summary:
  total_tests: 48
  by_result:
    PASS: 24
    CORRECT_NEGATIVE: 5
    FLAG_DETECTED: 7
    PARTIAL: 2
    WEAK_PASS: 4
    WEAK_FAIL: 2
    FAIL: 1
    AMBIGUOUS: 1
    HALLUCINATION_RISK: 1
    UNUSUAL: 1
    NOT_TESTED: 2

  by_step:
    a_address_to_institution:
      tested: 16
      pass_or_correct: 13
      partial_or_weak: 2
      fail: 1
      notes: >
        Strong performance on well-known institutions (OECD and non-OECD). Fails when
        address is outdated (Genspace moved). Correctly identifies incubators/coworking
        as shared spaces. Struggles with fictional entities at real addresses but often
        surfaces the correct occupant (LabCentral).

    b_payment_to_institution:
      tested: 3
      pass_or_correct: 2
      partial_or_weak: 0
      fail: 1
      notes: >
        Works well for large public companies with SEC filings. The fictional Helix
        Therapeutics case produced an ambiguous name collision with a real unrelated
        company. Step (b) has the smallest test set because billing entity data is
        rarely available on the public web.

    c_email_affiliation:
      tested: 12
      pass_or_correct: 10
      partial_or_weak: 1
      fail: 0
      hallucination_risk: 1
      notes: >
        Best-performing step. Institutional domains (.edu, .ac.uk, .ac.th, .de, .africa,
        .ac.ke) are reliably confirmed. Free email providers (163.com, qq.com, mail.ru,
        yandex.ru) are correctly identified as non-institutional. The one HALLUCINATION_RISK
        is gmail.com + Harvard, where Google Workspace integration results could mislead
        an LLM. Chula was a weak pass - the domain connection was implicit, not explicit.

    d_residential:
      tested: 6
      pass_or_correct: 4
      partial_or_weak: 1
      fail: 0
      notes: >
        Works well for clearly commercial buildings (MapQuest, LoopNet listings).
        Struggles with specific residential addresses that aren't listed on Zillow/Redfin.
        Real estate listing sites (Zillow, Redfin, RE/MAX) are strong residential signals
        but coverage is patchy for specific addresses.

    e_po_box_freight:
      tested: 8
      pass_or_correct: 4
      partial_or_weak: 2
      fail: 2
      notes: >
        PO box detection from address string is trivial (no search needed). Coworking/
        virtual office detection is strong when the address is a known WeWork/Regus.
        Freight forwarder detection FAILS unless the forwarder name is included in the
        query - Exa cannot identify an arbitrary street address as a freight forwarder
        warehouse. CMRA detection also weak.
