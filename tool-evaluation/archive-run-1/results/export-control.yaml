group: export-control
endpoints: [screening-list, bis-country-groups, iso-country-normalize, po-box-regex]
kyc_steps: [e]
tested_at: "2026-04-14"
total_cases: 78
rounds: 4

summary:
  po_box_regex:
    total_tested: 52
    true_positive: 14
    true_negative: 11
    false_positive: 0
    false_negative: 0
    precision: 1.0
    recall: 1.0
    notes: >
      Precision/recall measured against cases with explicit expected_pobox labels.
      25 seed cases had no expectation label (correctness=n/a). Among labeled
      cases, the regex achieved perfect detection for all covered language variants
      and zero false positives on adversarial false-positive bait addresses.
  iso_normalization:
    total_tested: 78
    correct: 76
    failed_to_resolve: 1
    wrong_result: 1
    accuracy: 0.974
    notes: >
      97.4% accuracy across direct codes, common abbreviations, formal names,
      non-English names, old names, and territories. 1 wrong result (Kosovo
      fuzzy-matched to Serbia), 1 failed resolution (misspelling "Australa").
      Ambiguous inputs ("Korea", "Congo") correctly returned null with warnings.
  bis_country_groups:
    total_tested_with_expectations: 17
    correct: 17
    wrong: 0
    accuracy: 1.0
    notes: >
      All 17 cases with explicit expected_disposition passed: 5 auto_deny
      (3 Group E + 2 Part 746), 4 license_required (Group D), 6 pass
      (Group A/B), 1 escalate_unmapped (Kosovo). Static table lookup is
      deterministic — the risk is upstream (normalization feeding wrong code).
  screening_list:
    status: BLOCKED
    notes: >
      Consolidated Screening List API deprecated/migrated — returns 301.
      Cannot test entity-level screening. This leaves a gap: no automated
      check against OFAC SDN, BIS Entity List, DPL, UVL, or MEU List.
      Entity screening must use either (a) a vendor solution (Visual Compliance,
      Descartes, SAP GTS) at $5K-50K/yr, or (b) manual download of CSV/XML
      exports from trade.gov and local search — feasible but loses real-time
      update cadence.

coverage_boundaries:
  - boundary: "PO Box — CJK/Arabic/Russian equivalents"
    status: not_covered
    evidence: >
      Chinese 信箱, Arabic ص.ب, Russian а/я — none detected by the regex.
      These are structurally outside the 7 covered language families (English,
      German, Spanish, French, Portuguese, Dutch, Italian + AU/ZA variants).
      Estimated impact: 20-40% of customers in non-covered-language countries
      (per m03 synthesis), though most synthesis order forms use Latin script.
    cases: [33, 34, 35]

  - boundary: "PO Box — character substitution (zero-for-O)"
    status: not_covered
    evidence: >
      "P 0 Box 999" (zero for letter O) was not detected. The regex requires
      literal 'O' characters. Fix: add [o0] character class in English patterns.
      Low engineering cost.
    cases: [30]

  - boundary: "PO Box — creative rewording ('Post Office Lock Box')"
    status: not_covered
    evidence: >
      "Post Office Lock Box" bypasses the regex. The pattern matches "Post
      Office Box" but the insertion of "Lock" breaks the match. Known gap
      from m03 synthesis, confirmed empirically.
    cases: [31]

  - boundary: "PO Box — fullwidth Unicode (NFKC normalized)"
    status: covered
    evidence: >
      Fullwidth Unicode characters (PO Box) correctly detected after
      NFKC normalization. The regex successfully catches this obfuscation
      attempt when NFKC is applied before matching.
    cases: [32]

  - boundary: "PO Box — international variants (7 language families)"
    status: covered
    evidence: >
      All tested international PO Box variants detected: Postfach (DE),
      Boite Postale (FR), BP (FR abbrev), Casella Postale (IT), Apartado
      Postal (ES), Postbus (NL), Caixa Postal (PT), Locked Bag (AU),
      Private Bag (ZA).
    cases: [15, 16, 17, 18, 19, 20, 21, 22, 23]

  - boundary: "PO Box — false positive resistance"
    status: covered
    evidence: >
      Zero false positives across 6 adversarial bait addresses: "Boxwood
      Lane", "Polar Bear St", "Apostle Drive", "Pomelo Way", "Box Elder
      Lane", and a Polish address containing "POl" substring. The PO prefix
      requirement and word boundary anchors prevent false matches.
    cases: [24, 25, 26, 27, 28, 29]

  - boundary: "ISO normalization — non-English country names"
    status: covered
    evidence: >
      Custom alias table handles Deutschland, Allemagne, Rossiya, Zhongguo,
      Nihon, Estados Unidos, Brasil, and more. These are not in pycountry's
      default database — the custom alias table is essential for coverage.
    cases: [61, 62, 63, 64, 65, 66, 49]

  - boundary: "ISO normalization — ambiguous names (Korea, Congo)"
    status: covered
    evidence: >
      "Korea" and "Congo" correctly return null with ambiguity warning rather
      than silently mapping to one country. This is the correct behavior —
      mismapping Korea to KR (Group A) vs KP (Group E) would be catastrophic.
    cases: [67, 68]

  - boundary: "ISO normalization — Kosovo (XK)"
    status: not_covered
    evidence: >
      "Kosovo" fuzzy-matched to Serbia (RS) instead of the user-assigned
      code XK. pycountry does not include Kosovo as a separate entry.
      The custom alias table should add "KOSOVO": "XK" explicitly. This
      is a real gap — Kosovo ships exist in international commerce.
    cases: [52]

  - boundary: "ISO normalization — misspellings"
    status: partially_covered
    evidence: >
      "Australa" (missing 'i') failed to resolve. pycountry's fuzzy search
      did not match. Minor misspellings may require Levenshtein-based matching
      or a more permissive fuzzy threshold.
    cases: [75]

  - boundary: "BIS Country Groups — Russia/Belarus Part 746"
    status: covered
    evidence: >
      Russia and Belarus correctly classified as auto_deny via Part 746
      overlay, even though they are technically Group D (not Group E) in
      the formal BIS table. The de-facto embargo status is captured.
    cases: [39, 40, 10]

  - boundary: "BIS Country Groups — Hong Kong vs. China distinction"
    status: covered
    evidence: >
      Hong Kong (HK) correctly classified as Group B (pass), separate from
      China (CN) which is Group D (license_required). This distinction matters
      operationally — HK has different BIS treatment despite PRC sovereignty.
    cases: [50]

  - boundary: "Consolidated Screening List — entity-level screening"
    status: blocked
    evidence: >
      API endpoint deprecated. Cannot test. This is the most significant
      gap in the export-control group: no automated entity-level screening
      against SDN, Entity List, DPL, UVL, or MEU. Country-level screening
      (BIS groups) catches jurisdiction risk but not named-party risk.
    cases: []

