group: individual-affiliation
endpoints: [orcid, openalex]
kyc_steps: [c]
tested_at: "2026-04-14"
total_cases: 28
rounds: 2

summary:
  covered: 8
  partially_covered: 9
  not_covered: 11

coverage_boundaries:
  - boundary: "Common names (Chinese, Korean, Indian)"
    status: not_covered
    evidence: "Wei Zhang: 9085 OpenAlex results, 3304 ORCID. Qiang He: 706 OpenAlex, 1 ORCID (with Chongqing filter). Even with OpenAlex institution filter, 7 different 'Qiang He' at Chongqing Medical University — none identifiable as the target. Maria Garcia: 17865 OpenAlex. Name-only search is useless for disambiguation."
    cases: [8, 10, 11, 12]

  - boundary: "Industry researchers at small companies"
    status: not_covered
    evidence: "Satishchandran Chandrasekhar (Lay Sciences): 0 ORCID, 0 OpenAlex. Du Huifen (Lanzhou Yahua): 1 ORCID (empty employment), OpenAlex shows only academic affiliations. Institutions not in OpenAlex: Lay Sciences, Fusix Biotech, GREENVAX, Lanzhou Yahua, Darts Bio — all returned 0 institution results."
    cases: [5, 22, 25]

  - boundary: "Researchers who changed institutions"
    status: partially_covered
    evidence: "Raiees Andrabi moved from Scripps to UPenn in 2023. ORCID correctly shows UPenn as current (self-asserted). OpenAlex last_known_institutions still lists Scripps first, UPenn fourth. OpenAlex affiliations lag the actual move by potentially years. Gert Zimmer shows Hannover in our data but ORCID says IVI Switzerland since 2009."
    cases: [1, 16]

  - boundary: "Mismatched email domain vs claimed institution"
    status: partially_covered
    evidence: "Kirill Nemirov (TheraVectys, pasteur.fr email): OpenAlex shows both Institut Pasteur and Theravectys affiliations. Jennifer Altomonte (Fusix Biotech, tum.de email): OpenAlex shows TU Munich, no Fusix Biotech. SOHN Myung Hyun (GREENVAX, yuhs.ac email): OpenAlex shows Yonsei, no GREENVAX. Neither ORCID nor OpenAlex can connect these researchers to their startup employers."
    cases: [6, 7, 28]

  - boundary: "Community bio lab members"
    status: not_covered
    evidence: "Genspace: 2 ORCID records (both self-asserted), 0 OpenAlex institutions. BioCurious: 0 OpenAlex institutions. Counter Culture Labs: 0 OpenAlex institutions. Community labs are invisible to both systems."
    cases: [9]

  - boundary: "Early-career / low-publication researchers"
    status: partially_covered
    evidence: "Ina Trotz: 0 ORCID, 1 OpenAlex (2 works only). Giselle Funchal: 0 ORCID matching, 1 OpenAlex (8 works). Low-publication researchers exist in OpenAlex but with thin profiles that provide weak evidence."
    cases: [23, 24]

  - boundary: "ORCID self-asserted vs institution-verified"
    status: not_covered
    evidence: "0 out of 11 employment records tested were institution-verified. All were self-asserted. MIT has 3484 records via ringgold search but individual records we checked had self-asserted employments. The 'institution-verified' trust marker barely exists in practice for the researchers we tested."
    cases: [1, 2, 3, 16, 17, 25]

  - boundary: "Sanctioned institution researchers"
    status: covered
    evidence: "Esmaeil Saberfar: found in both ORCID (1 result) and OpenAlex (31 works, h=8) with Baqiyatallah University affiliation. Mohammad Sadegh Hashemzadeh: OpenAlex shows 52 works at Baqiyatallah. Baqiyatallah exists as OpenAlex institution with 12385 works. Sanctioned institutions are paradoxically well-covered because they publish extensively."
    cases: [26, 27]

  - boundary: "PubMed-active researchers with unique names"
    status: covered
    evidence: "Bart Faber: 1 ORCID match (correct, BPRC confirmed), 1 OpenAlex top match (76 works, h=32). Georg Herrler: 1 ORCID match, 2 OpenAlex (top=209 works, h=56). Pierre Charneau: ORCID found, OpenAlex 160 works, h=60. Unique names + publication records = reliable identification."
    cases: [2, 21, 20]

  - boundary: "Large biotech companies (Genentech, Twist)"
    status: covered
    evidence: "Genentech: 1512 ORCID affiliation results, OpenAlex institution exists (936 works). Twist Bioscience: OpenAlex institution exists (119 works). Large biotechs with publications are findable. The gap is small companies."
    cases: [19]

results:
  # Round 1 — Seed cases
  - case_id: 1
    round: 1
    name: "Raiees Andrabi"
    institution: "Scripps Research"
    type: academic_researcher
    country: US
    difficulty: easy
    orcid:
      query: "family-name:Andrabi AND affiliation-org-name:Scripps"
      num_found: 1
      orcid_id: "0000-0001-8837-7520"
      affiliation_found: true
      current_affiliation: "University of Pennsylvania (since 2023)"
      previous_affiliations: ["Scripps Research Institute (2013-2023)"]
      assertion_type: self-asserted
      notes: "CRITICAL: ORCID shows UPenn since July 2023. Our seed data says Scripps. ORCID is more current than the publication record. All 3 employment entries are self-asserted."
    openalex:
      query: "Raiees Andrabi"
      num_results: 3
      top_match: "Raiees Andrabi (A5051894320)"
      works_count: 120
      h_index: 30
      last_known_institutions: ["Scripps Research Institute", "International AIDS Vaccine Initiative", "California University of Pennsylvania", "University of Pennsylvania"]
      affiliation_years: {scripps: "2013-2025", iavi: "2015-2025", upenn: "2025"}
      notes: "OpenAlex still lists Scripps first in last_known_institutions despite the move to UPenn. Publication lag means OpenAlex takes years to reflect job changes. Disambiguated correctly due to unique name."
    verdict: partially_covered
    verdict_reason: "Person found unambiguously. But ORCID and OpenAlex disagree on current institution. ORCID is more current but self-asserted. OpenAlex affiliations lag reality."

