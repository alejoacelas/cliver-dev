  # --- LLM+Exa group ---
  - id: exa
    name: Exa neural search (LLM+Exa standalone)
    url: https://api.exa.ai/search
    auth: x-api-key header
    status: live
    credential_env_var: EXA_API_KEY
    test_result: "OK — query 'MIT biosafety' returned 1 result: 'Biological - MIT EHS'."
    rate_limit: "1,000 searches/month (free tier)"
    max_test_budget: 100
    cost_per_call: "$0.001-$0.01 (varies by mode)"
    cost_source: "exa.ai/pricing"
    measures: [M02, M03, M04, M05, M12]
    kyc_steps: [a, b, c, d, e]
    group: llm-exa
    notes: "Neural search mode by default. Used as standalone 'endpoint' — LLM formulates a query per KYC step, Exa searches, LLM interprets results. Each KYC step gets its own prompt template."
