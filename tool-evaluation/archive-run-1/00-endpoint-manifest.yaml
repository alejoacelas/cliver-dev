  - id: po-box-regex
    name: PO Box regex
    url: null
    auth: none
    status: live
    credential_env_var: null
    test_result: "OK — local logic. Pattern matching for PO Box, APO/FPO, PMB address formats."
    rate_limit: "N/A (local)"
    max_test_budget: 999
    cost_per_call: "$0"
    cost_source: "local logic"
    measures: [M03]
    kyc_steps: [e]
    group: export-control
