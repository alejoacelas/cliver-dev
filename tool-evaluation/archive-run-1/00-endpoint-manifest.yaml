  - id: iso-country-normalize
    name: ISO 3166 country normalization
    url: null
    auth: none
    status: live
    credential_env_var: null
    test_result: "OK — local logic. Maps common country name variants to ISO 3166-1 alpha-2 codes."
    rate_limit: "N/A (local)"
    max_test_budget: 999
    cost_per_call: "$0"
    cost_source: "local logic"
