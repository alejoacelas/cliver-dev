    what_to_look_for: "Researchers with free email domains (163.com, yahoo.com, gmail.com) — these are the hardest cases for affiliation verification since the email doesn't match the institution."

pre_committed_reasoning: |
  ORCID and OpenAlex serve different purposes for affiliation verification:
  - ORCID: explicitly lists employment/education history. ~2% of records are institution-verified
    (near-conclusive), but 98% are self-asserted (an attacker could create a fake ORCID with
    any claimed affiliation). The key signal is whether a verified trust marker exists.
  - OpenAlex: derives affiliations from publication metadata. More objective (you can't fake
    having published from an institution) but only works for researchers with publications.

  Expected coverage gaps:
  1. Common names (especially Chinese, Korean, Indian names): disambiguation will fail or return
     wrong person. "Qiang He" will match hundreds of researchers.
  2. Industry researchers: may have prior academic publications but current company affiliation
     won't be in either system.
  3. Early-career researchers: few or no publications, may not have ORCID yet.
  4. Community lab members: operate completely outside the scholarly publication system.
  5. Mismatched affiliations: researchers using one institution's email but claiming a different
     institution (e.g., pasteur.fr email for a startup employee — was a postdoc there, now at startup).

  The critical question: can ORCID/OpenAlex confirm a specific person is at a specific institution
  right now? Or only that they were associated at some point in the past?
