      spf: "v=spf1 redirect=spf.tsinghua.edu.cn"
      dmarc: "v=DMARC1; p=quarantine"
    incommon:
      in_federation: true  # Via CARSI
      entity_count: 1

  - id: 33
    domain: snu.ac.kr
    institution: "Seoul National University"
    rdap:
      method: whois
      creation_date: "1997-06-25"
      expiration_date: "2028-04-12"
      finding: "Korean WHOIS works and returns dates."
    mx_spf_dmarc:
      mx: ["1 aspmx1.gov-dooray.com."]
      spf: "v=spf1 include:_spf.snu.ac.kr include:_spf2.snu.ac.kr ... ~all"
      dmarc: "v=DMARC1; p=none"
    incommon:
      in_federation: true  # Via KAFE
      entity_count: 1
    finding: "DMARC p=none despite being a top Korean university. KAFE has only 29 IdPs in eduGAIN."

  - id: 34
    domain: sharif.edu
    institution: "Sharif University of Technology (Iran)"
    rdap:
      method: whois
      result: registered  # In Educause WHOIS — Sharif has a .edu domain!
      finding: "Sharif University (Iran) has a .edu domain — registered through Educause. This is unusual for a non-US institution."
    mx_spf_dmarc:
      mx: ["10 mx01.sharif.edu.", "10 mx02.sharif.edu."]
      spf: "v=spf1 mx -all"
      dmarc: "v=DMARC1; p=quarantine"
    incommon:
      in_federation: false
      note: "Zero results in InCommon MDQ despite having a .edu domain. Sharif is NOT an InCommon participant."
    finding: ".edu domain does NOT guarantee InCommon membership. Sharif.edu is a valid .edu but not in InCommon. This means the 'check if .edu is in InCommon' heuristic has false negatives."

  - id: 35
    domain: ut.ac.ir
    institution: "University of Tehran"
    rdap:
      method: whois
      finding: ".ir has no RDAP server. WHOIS not tested (different registry)."
    mx_spf_dmarc:
      mx: ["10 mx01.ut.ac.ir.", "10 mx02.ut.ac.ir."]
      spf: "v=spf1 ip4:80.66.179.13 ip4:80.66.179.14 mx -all"
      dmarc: "v=DMARC1; p=quarantine"
    edugain:
      federation: "IRFED (Iran)"
      federation_size: "2 IdPs"
      finding: "Iran has only 2 IdPs in all of eduGAIN. Near-zero coverage. Cannot rely on federation for Iranian institutions."

  # --- Sanctioned institution domains ---
  - id: 36
    domain: bmsu.ac.ir
    institution: "Baqiyatallah University of Medical Sciences"
    sanctioned: true
    rdap:
      method: none
      finding: ".ir has no RDAP. No WHOIS tested."
    mx_spf_dmarc:
      mx: null
      spf: null
      dmarc: null
      assessment: "ZERO DNS records. No MX, no SPF, no DMARC. This institution has no email infrastructure visible in public DNS."
    finding: "Baqiyatallah has no email infrastructure at all — researchers must use free email (yahoo, gmail). This means email-domain screening is BLIND to Baqiyatallah affiliations. Detection requires entity-level screening."

  - id: 37
    domain: mut.ac.ir
    institution: "Malek Ashtar University of Technology"
    sanctioned: true
    mx_spf_dmarc:
      mx: ["10 mail.mut.ac.ir."]
      spf: null
      dmarc: null
    finding: "MUT (IRGC-affiliated) has MX but no SPF or DMARC. Minimal email config. Better than bmsu.ac.ir but still weak."

  # --- Privacy-focused email ---
  - id: 38
    domain: protonmail.com
    category: privacy_email
    mx_spf_dmarc:
      mx: ["5 mail.protonmail.ch.", "10 mailsec.protonmail.ch."]
      spf: "v=spf1 include:_spf.protonmail.ch ~all"
      dmarc: "v=DMARC1; p=quarantine; aspf=s; adkim=s"
    finding: "ProtonMail has good email auth (DMARC quarantine, strict alignment). Privacy-focused but not disposable. Should be soft-flagged like other free mail."
    verdict: SOFT_FLAG

  - id: 39
    domain: tutanota.com
    category: privacy_email
    mx_spf_dmarc:
      mx: ["0 mail.tutanota.de."]
      spf: "v=spf1 include:spf.tutanota.de -all"
      dmarc: "v=DMARC1; p=quarantine; adkim=s"
    finding: "Tutanota (now Tuta) — encrypted email. Good auth config. Like ProtonMail, privacy-focused but legitimate."
    verdict: SOFT_FLAG

# ===========================================================================
# RDAP COVERAGE MAP
# ===========================================================================

rdap_coverage:
  has_rdap:
    - tld: ".com"
      server: "rdap.verisign.com/com/v1"
      returns_dates: true
    - tld: ".net"
      server: "rdap.verisign.com/net/v1"
      returns_dates: true
    - tld: ".org"
      server: "rdap.publicinterestregistry.org/rdap"
      returns_dates: true  # assumed
    - tld: ".in (.ac.in)"
      server: "rdap.nixiregistry.in/rdap"
      returns_dates: true
    - tld: ".au (.edu.au)"
      server: "rdap.cctld.au/rdap"
      returns_dates: false  # returns status but no dates
    - tld: ".uk (.ac.uk)"
      server: "rdap.nominet.uk/uk"
      returns_dates: false  # returns neither dates nor status
  no_rdap:
    - ".edu — use whois.educause.edu (no dates, registrant only)"
    - ".ac (Ascension Island / Korean academic) — no per-domain WHOIS"
    - ".cn (.edu.cn) — CNNIC WHOIS returns referral only"
    - ".ir (.ac.ir) — no RDAP, no accessible WHOIS"
    - ".ru — no RDAP"
    - ".kr (.ac.kr) — Korean WHOIS works, returns dates"
    - ".jp — not tested"

