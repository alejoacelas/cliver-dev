  - id: 24
    name: "NUST Islamabad (Pakistan)"
    type: academic
    country: PK
    google_places:
      query: "National University of Sciences and Technology, Islamabad, Pakistan"
      primary_type: university
      display_name: "National University of Sciences & Technology"
      verdict: PASS

  # --- SENSITIVE / SANCTIONED INSTITUTIONS ---

  - id: 25
    name: "Wuhan Institute of Virology (China)"
    type: sensitive_research
    country: CN
    google_places:
      query: "Wuhan Institute of Virology, Wuhan, China"
      primary_type: research_institute
      display_name: "Wuhan Institute of Virology, CAS: Hubei Engineering and Technology Research Center for Viral Diseases"
      verdict: NEUTRAL  # found as research_institute, same type as Institut Pasteur
    notes: >
      Returns research_institute -- identical to how Institut Pasteur is classified.
      No API provides sanctions or concern-level signals. Address classification cannot
      distinguish sanctioned from non-sanctioned research institutes. Sanctions screening
      requires a separate endpoint (OFAC SDN list, denied parties screening).

  - id: 26
    name: "VECTOR State Research Center (Russia)"
    type: sanctioned_institution
    country: RU
    google_places:
      query: "VECTOR State Research Center of Virology and Biotechnology, Koltsovo, Russia"
      primary_type: research_institute
      display_name: "Vektor, Gosudarstvennyy Nauchnyy Tsentr Virusologii I Biotekhnologii"
      verdict: NEUTRAL  # found but no sanctions signal
    notes: >
      VECTOR is on OFAC sanctions lists but Google Places returns research_institute with
      no distinguishing signal. Address classification is the wrong layer for sanctions.

  # --- COMMUNITY BIO LABS ---

  - id: 27
    name: "Genspace (Brooklyn community bio lab)"
    type: community_lab
    country: US
    smarty:
      rdi: Commercial
      dpv_match_code: "Y"
      dpv_cmra: "N"
      record_type: H
      verdict: MISS  # looks like normal commercial suite
    google_places:
      query: "Genspace, Brooklyn, NY"
      primary_type: non_profit_organization
      types: [non_profit_organization, community_center, event_venue, educational_institution, service, association_or_organization, point_of_interest, establishment]
      display_name: "Genspace"
      address: "132 32nd St #108, Brooklyn, NY 11232"
      verdict: INTERESTING  # non_profit_organization + community_center + educational_institution
    notes: >
      Genspace is classified as non_profit_organization with community_center and
      educational_institution in types. This is actually a useful signal -- the combination
      of non_profit + community_center + educational_institution is distinctive. However,
