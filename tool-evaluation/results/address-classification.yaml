      address: "3108 Patrick Henry Dr, Santa Clara, CA 95054"  # different address than queried!
      verdict: INTERESTING  # found as non_profit but at different address (they moved)
    notes: >
      BioCurious found as non_profit_organization but at a different address (they appear
      to have moved from 845 Stewart Dr to 3108 Patrick Henry Dr). The non_profit_organization
