  - id: 23
    name: "University of Ibadan (Nigeria)"
    type: academic
    country: NG
    google_places:
      query: "University of Ibadan, Ibadan, Nigeria"
      primary_type: consultant  # WRONG
      types: [consultant, university, school, educational_institution, point_of_interest, service, establishment]
      display_name: "University of Ibadan"
      verdict: PARTIAL  # university in types but primaryType is "consultant"
    notes: >
      INTERESTING FAILURE: University of Ibadan's primaryType is "consultant" despite
      having "university" in the types array. This is a Google Places classification error
