  # --- RESIDENTIAL EDGE CASES ---

  - id: 29
    name: "Harvard science building (52 Oxford St)"
    type: academic_building
    country: US
    smarty:
      rdi: Residential  # WRONG - this is a university science building
      dpv_match_code: "Y"
      dpv_cmra: "N"
      record_type: S
      verdict: FAIL  # misclassifies university building as Residential
    google_places:
      query: "52 Oxford St, Cambridge, MA 02138"
      primary_type: null
      types: [subpremise, street_address]
      display_name: "52 Oxford St"
      verdict: FAIL  # returns generic subpremise
    notes: >
      CRITICAL FALSE POSITIVE: 52 Oxford St is Harvard's Science Center / Northwest Science
      Building area. Smarty classifies it as Residential. A KYC pipeline relying on RDI=Residential
      as a flag would incorrectly flag legitimate university shipments to this address.
      This demonstrates that RDI reflects USPS delivery infrastructure, not actual building use.

  - id: 30
    name: "NYC residential high-rise (200 E 89th St)"
    type: residential_highrise
    country: US
    smarty:
      rdi: Commercial  # UNEXPECTED for a residential building
      dpv_match_code: "D"
      dpv_cmra: "N"
      record_type: H  # highrise
      building_default_indicator: "Y"
      verdict: FAIL  # misclassifies residential high-rise as Commercial
    google_places:
      query: "200 E 89th St, New York, NY 10128"
      primary_type: premise
      types: [premise, street_address]
      display_name: "200 E 89th St"
      verdict: NEUTRAL  # no residential signal
    notes: >
      CRITICAL FALSE NEGATIVE: Large NYC residential buildings get classified as Commercial
      by Smarty because they have managed mail rooms and commercial-style USPS delivery.
      A customer ordering to a residential high-rise would NOT trigger the Residential flag.
