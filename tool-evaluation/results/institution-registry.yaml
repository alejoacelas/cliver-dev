            useful_for: [a-address-institution]
            assessment: >
              Lists Brisbane (main campus). The seed case address is Gold Coast campus
              (Southport QLD). A customer at the Gold Coast campus would show a city
              mismatch despite being at a legitimate Griffith location.
          - field: domains
            useful_for: [c-email-affiliation]
            assessment: "griffith.edu.au present — email matching works."
      - endpoint: gleif
        query: "GET https://api.gleif.org/api/v1/lei-records?filter[entity.legalName]=Griffith+University"
        status: not_covered
        response_summary:
          total: 0
        relevant_fields: []
      - endpoint: companies-house
        query: n/a
        status: not_covered
        response_summary:
          note: "Non-UK entity"
        relevant_fields: []
    notes: >
      Multi-campus problem confirmed. ROR lists Brisbane; customer is at Gold Coast.
      City-level matching would produce a false mismatch for satellite campus customers.

