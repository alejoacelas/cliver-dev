group: institution-registry
endpoints: [ror, gleif, companies-house]
# OpenCorporates excluded — blocked (API requires paid account)
kyc_steps: [a]
tested_at: "2026-04-14"
total_cases: 35
rounds: 2

summary:
  covered: 14
  partially_covered: 9
  not_covered: 12

coverage_boundaries:
  - boundary: "Community bio labs and makerspaces"
    status: not_covered
    evidence: >
      Tested 5 community labs (Genspace, BioCurious, La Paillasse, Hackuarium, BioClub Tokyo).
      Zero results in ROR (all returned 0 or only irrelevant matches), zero in GLEIF, zero in
      Companies House. These entities exist in no institutional registry. This is a hard gap —
      community labs are the canonical synthesis customer type that falls through all lookups.
    cases: [10, 11, 12, 13, 14]

  - boundary: "Small biotech startups (<50 employees, not publicly traded)"
    status: not_covered
    evidence: >
      Tested 6 small biotechs from customer data (Lay Sciences, Virometix AG, AdaptVac,
      Signablok Inc, Fusix Biotech, Uvax Bio). All returned zero results in ROR, zero in
      GLEIF, and only noise in Companies House. Small biotechs have no LEI (not required),
      no ROR record (no significant research output), and no UK registration unless UK-based.
    cases: [7, 28, 29, 30, 31, 37]

  - boundary: "ROR city-level only — no street addresses"
    status: partially_covered
    evidence: >
      ROR provides city and country but never street addresses. For the KYC flag
      "No public association between affiliation and shipping address," city-level is
      insufficient — it can confirm the customer is in the right city but cannot validate
      a specific street address. Multi-campus institutions (Griffith: Brisbane vs Gold Coast)
      further dilute the city signal.
    cases: [1, 2, 4, 6]

  - boundary: "GLEIF legal addresses are often misleading"
    status: partially_covered
    evidence: >
      GLEIF provides street addresses, but for many entities the legal address is a registered
      agent (Pfizer's legal address is Corporation Trust Center, 1209 Orange St, Wilmington DE
      — not their actual office). Oxford's GLEIF results point to individual colleges, one of
      which lists a Liverpool investment manager address. The headquartersAddress field is more
      useful but still may be outdated (Pfizer HQ shows 235 E 42nd St, not the current 66
      Hudson Blvd address).
    cases: [2, 3]

  - boundary: "GLEIF requires exact legal name matching"
    status: partially_covered
    evidence: >
      GLEIF's legalName filter is exact-prefix or substring. Searching "Pfizer Inc" returns
      "PFIZER INC." (5 results). Searching just "Pfizer" returns 171 results including the
      parent. But "GSK" returns 56 unrelated entities (GSK Enterprises, GSK Cranes, etc.) — the
      abbreviation doesn't map to GlaxoSmithKline. Searching "Facebook Inc" finds only
      "FACEBOOK OVERSEAS, INC." — the parent renamed to Meta Platforms. Name changes break
      GLEIF lookups unless you know the current legal name.
    cases: [3, 26, 32]

  - boundary: "Companies House returns massive noise for non-UK entities"
    status: not_covered
    evidence: >
      Every non-UK query returned total_results=10000 with completely irrelevant matches.
      Scripps returned "UK SCRIPPSLNS OF OCEANS CELL BIOLOGICAL LTD." Companies House is
      only useful for UK-registered entities. For UK entities (AstraZeneca), it provides
      excellent street-level addresses.
    cases: [1, 3, 7, 33]

  - boundary: "Government sub-units (labs within agencies)"
    status: partially_covered
    evidence: >
      Canada's National Microbiology Laboratory returned zero relevant results in ROR — the
      top hit was a Chinese State Key Laboratory. The parent (PHAC) IS in ROR but in Ottawa,
      not Winnipeg where NML is. NML is not listed as a child of PHAC. Contrast with MIT
      Lincoln Lab, which IS a separate ROR record with correct parent relationship and correct
      city (Lexington). Coverage is inconsistent — some sub-units have records, many don't.
    cases: [5, 19, 22, 40]

  - boundary: "CDC-style disambiguation (same name, multiple countries)"
    status: partially_covered
    evidence: >
      Querying "Centers for Disease Control and Prevention" returns the Uganda office first,
      Kenya office second, and the US CDC third. ROR's relevance ranking does not prioritize
      the "main" entity. For KYC, this means automated matching could select the wrong country
      office. The US CDC (Atlanta) is only the 3rd result.
    cases: [19]

  - boundary: "ROR domains field is inconsistently populated"
    status: partially_covered
    evidence: >
      Some institutions have domains (Oxford: ox.ac.uk, IIT Kanpur: iitk.ac.in, Makerere:
      mak.ac.ug, CSIRO: csiro.au). Others don't (Scripps, Baqiyatallah, TiHo Hannover,
      University of Nairobi, CDC, USAMRIID, Wuhan Institute of Virology). Cannot rely on
      ROR domains for email-to-institution matching.
    cases: [1, 2, 4, 8, 9, 15, 16]

  - boundary: "Non-OECD established universities"
    status: covered
    evidence: >
      Contrary to initial hypothesis, ROR covers non-OECD universities well. University of
      Nairobi (Kenya), Makerere (Uganda), Al-Farabi (Kazakhstan), Universitas Indonesia all
      found with correct city. Baqiyatallah (Iran, IRGC-affiliated) found with Persian alias.
      NUDT (PLA-affiliated, China) found with Chinese name. Sanctioned status does not affect
      ROR coverage — presence in ROR says nothing about sanctions.
    cases: [8, 15, 16, 17, 18, 34, 35]

  - boundary: "Large CROs and contract labs"
    status: covered
    evidence: >
      Eurofins, Charles River Laboratories, and WuXi AppTec all appear in both ROR and GLEIF.
      ROR returns country subsidiaries (Eurofins France, Charles River Netherlands, WuXi US/China).
      GLEIF returns holding companies (Eurofins Scientific SE in Luxembourg). Both provide some
      address data but may not match the specific lab site a customer ships from.
    cases: [23, 24, 25]

results:
  # ==================== ROUND 1: Seed cases ====================

  - case_id: 1
    round: 1
    name: "The Scripps Research Institute"
    type: academic
    country: US
    difficulty: easy
    endpoints_tested:
      - endpoint: ror
        query: "GET https://api.ror.org/v2/organizations?query=The+Scripps+Research+Institute"
        status: covered
        response_summary:
          ror_id: "https://ror.org/02dxx6824"
          name: "Scripps Research Institute"
          country: United States
          city: San Diego
          types: [funder, nonprofit]
          domains: []
        relevant_fields:
          - field: locations[0].city
            useful_for: [a-address-institution]
            assessment: "City-level only (San Diego). Cannot confirm street address."
          - field: domains
            useful_for: [c-email-affiliation]
            assessment: "EMPTY — scripps.edu is NOT in the domains field. Cannot use for email matching."
          - field: links[0].value
            useful_for: [a-address-institution]
            assessment: "Website URL (scripps.edu) available but requires additional scraping to extract address."
      - endpoint: gleif
        query: "GET https://api.gleif.org/api/v1/lei-records?filter[entity.legalName]=The+Scripps+Research+Institute"
        status: not_covered
        response_summary:
          total: 0
        relevant_fields: []
      - endpoint: companies-house
        query: "GET https://api.company-information.service.gov.uk/search/companies?q=The+Scripps+Research+Institute"
        status: not_covered
        response_summary:
          total_results: 10000
          top_match: "UK SCRIPPSLNS OF OCEANS CELL BIOLOGICAL LTD"
          relevant: false
        relevant_fields: []
    notes: >
      ROR hit but domains field empty — cannot use for email domain matching. City-level
      only (San Diego vs La Jolla — the seed case address says La Jolla but ROR says San Diego,
      which is technically correct as La Jolla is a neighborhood of San Diego). GLEIF and
      Companies House provide nothing.

  - case_id: 2
    round: 1
    name: "University of Oxford"
    type: academic
    country: GB
    difficulty: easy
    endpoints_tested:
      - endpoint: ror
        query: "GET https://api.ror.org/v2/organizations?query=University+of+Oxford"
        status: covered
        response_summary:
          ror_id: "https://ror.org/052gg0110"
          name: "University of Oxford"
          country: United Kingdom
          city: Oxford
          types: [education, funder]
          domains: [ox.ac.uk]
        relevant_fields:
          - field: domains
            useful_for: [c-email-affiliation]
            assessment: "ox.ac.uk present — strong email match signal."
          - field: locations[0].city
            useful_for: [a-address-institution]
            assessment: "City-level only (Oxford). Sufficient for city matching."
      - endpoint: gleif
        query: "GET https://api.gleif.org/api/v1/lei-records?filter[entity.legalName]=University+of+Oxford"
        status: partially_covered
        response_summary:
          total: 22
          top_matches:
            - "Swiss Friends of Oxford University (Zug, Switzerland)"
            - "Wolfson College in the University of Oxford (Oxford)"
            - "St Edmund Hall in the University of Oxford (Liverpool — investment manager address)"
          note: "Returns individual colleges and affiliates, NOT the university itself"
        relevant_fields:
          - field: entity.legalAddress
            useful_for: [a-address-institution]
            assessment: >
              MISLEADING — addresses are for investment managers (Liverpool) or international
              affiliates (Zug), not the university's actual address. St Edmund Hall's GLEIF
              address is Rathbone Investment Management in Liverpool.
      - endpoint: companies-house
        query: "GET https://api.company-information.service.gov.uk/search/companies?q=University+of+Oxford"
        status: partially_covered
        response_summary:
          total_results: 10000
          top_matches:
            - "Templeton College in the University of Oxford (RC000751, active, no address)"
            - "Linacre College in the University of Oxford (RC000722, active, no address)"
            - "Mansfield College in the University of Oxford (RC000752, active, no address)"
          note: "Individual colleges as royal-charter entities, addresses mostly empty"
        relevant_fields:
          - field: address
            useful_for: [a-address-institution]
            assessment: "Empty for royal-charter college registrations. Not useful."
    notes: >
      ROR is the only useful source here. GLEIF and Companies House both fragment the
      university into individual colleges, and the addresses returned are often for financial
      intermediaries rather than actual campus addresses.

  - case_id: 3
    round: 1
    name: "Pfizer Inc"
    type: pharma
    country: US
    difficulty: easy
    endpoints_tested:
      - endpoint: ror
        query: "GET https://api.ror.org/v2/organizations?query=Pfizer+Inc"
        status: partially_covered
        response_summary:
          top_matches:
            - "Pfizer (Sweden) — Sollentuna"
            - "Pfizer (United Kingdom) — Tadworth"
            - "Pfizer (Japan) — Tokyo"
          note: "Returns country subsidiaries, NOT the US parent. No 'Pfizer Inc' record."
        relevant_fields:
          - field: locations[0].city
            useful_for: [a-address-institution]
            assessment: "Returns wrong country subsidiaries. Swedish office ranked first for a US company."
      - endpoint: gleif
        query: "GET https://api.gleif.org/api/v1/lei-records?filter[entity.legalName]=Pfizer+Inc"
        status: partially_covered
        response_summary:
          total: 5
          top_match:
            lei: "765LHXWGK1KXCLTFYQ30"
            name: "PFIZER INC."
            legal_address: "C/O The Corporation Trust Company, 1209 Orange St, Wilmington, DE 19801"
            hq_address: "235 East 42nd Street, New York, NY 10017"
          note: "Legal address is a Delaware registered agent, NOT actual office. HQ address is outdated (pre-2024 move)."
        relevant_fields:
          - field: entity.legalAddress
            useful_for: [a-address-institution]
            assessment: >
              MISLEADING — legal address is Corporation Trust Center in Wilmington DE
              (registered agent). Would incorrectly flag any Pfizer office as unassociated.
          - field: entity.headquartersAddress
            useful_for: [a-address-institution]
            assessment: >
              Better but OUTDATED — 235 E 42nd St was Pfizer's HQ before 2024 move to
              66 Hudson Blvd East. Address-matching against current Pfizer offices would fail.
      - endpoint: companies-house
        query: "GET https://api.company-information.service.gov.uk/search/companies?q=Pfizer+Inc"
        status: partially_covered
        response_summary:
          total_results: 10000
          top_match: "PFIZER LIMITED (Sandwich, Kent CT13 9NJ) — active"
          note: "UK subsidiary only. Address is the Sandwich manufacturing site."
        relevant_fields:
          - field: address
            useful_for: [a-address-institution]
            assessment: "Correct UK subsidiary address but only for UK operations."
    notes: >
      Pfizer demonstrates multiple address data problems: ROR returns wrong subsidiaries first,
      GLEIF's legal address is a trust agent, GLEIF's HQ address is outdated, and Companies
      House only shows the UK subsidiary. For a customer shipping to Pfizer's current NY HQ,
      NONE of these registries would confirm the address.

  - case_id: 4
    round: 1
    name: "Indian Institute of Technology Kanpur"
    type: academic
    country: IN
    difficulty: medium
    endpoints_tested:
      - endpoint: ror
        query: "GET https://api.ror.org/v2/organizations?query=Indian+Institute+of+Technology+Kanpur"
        status: covered
        response_summary:
          ror_id: "https://ror.org/05pjsgx75"
          name: "Indian Institute of Technology Kanpur"
          country: India
          city: Kanpur
          types: [education, funder]
          domains: [iitk.ac.in]
        relevant_fields:
          - field: domains
            useful_for: [c-email-affiliation]
            assessment: "iitk.ac.in present — strong email match."
          - field: locations[0].city
            useful_for: [a-address-institution]
            assessment: "City match (Kanpur). Correct IIT campus disambiguated."
      - endpoint: gleif
        query: "GET https://api.gleif.org/api/v1/lei-records?filter[entity.legalName]=Indian+Institute+of+Technology+Kanpur"
        status: covered
        response_summary:
          total: 1
          lei: "984500DF393AA060B162"
          name: "INDIAN INSTITUTE OF TECHNOLOGY KANPUR"
          address: "Research and Development Office, Accounts-2, IIT, Kanpur Nagar, Kanpur, UP 208016, IN"
          status: ACTIVE
        relevant_fields:
          - field: entity.legalAddress
            useful_for: [a-address-institution]
            assessment: "Street-level address with postal code. One of the rare academic institutions with an LEI."
      - endpoint: companies-house
        query: n/a
        status: not_covered
        response_summary:
          note: "Non-UK entity — Companies House irrelevant"
        relevant_fields: []
    notes: >
      Surprise: IIT Kanpur has an LEI, providing street-level address data. This is unusual
      for an academic institution — likely due to international research funding requirements.
      Both ROR and GLEIF cover it well. The IIT system disambiguation works correctly.

  - case_id: 5
    round: 1
    name: "National Microbiology Laboratory, Public Health Agency of Canada"
    type: government_lab
    country: CA
    difficulty: medium
    endpoints_tested:
      - endpoint: ror
        query: "GET https://api.ror.org/v2/organizations?query=National+Microbiology+Laboratory"
        status: not_covered
        response_summary:
          total: 5287
          top_matches:
            - "State Key Laboratory of Agricultural Microbiology (Wuhan, China)"
            - "Molecular Microbiology (Porto, Portugal)"
            - "Microbiology Society (London, UK)"
          note: >
            No result for Canada's NML. Top results are completely unrelated. The parent
            org (PHAC) IS in ROR (https://ror.org/023xf2a37) but lists Ottawa, not
            Winnipeg. NML is NOT listed as a child of PHAC — only "National Collaborating
            Centre for Methods and Tools" is.
        relevant_fields: []
      - endpoint: gleif
        query: "GET https://api.gleif.org/api/v1/lei-records?filter[entity.legalName]=National+Microbiology+Laboratory"
        status: not_covered
        response_summary:
          total: 0
        relevant_fields: []
      - endpoint: companies-house
        query: n/a
        status: not_covered
        response_summary:
          note: "Non-UK entity — Companies House irrelevant"
        relevant_fields: []
    notes: >
      Complete miss. The NML is a real BSL-4 lab in Winnipeg that handles dangerous pathogens,
      but it appears in no registry. The parent org (PHAC) is in ROR but mapped to Ottawa (HQ),
      not Winnipeg (lab). This is a significant gap for biosecurity screening — government
      sub-units that handle controlled agents are among the most important to verify.

  - case_id: 6
